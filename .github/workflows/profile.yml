name: refresh profile card

on:
  schedule:
    - cron: "30 3 * * *"        # daily ~09:00 IST
  workflow_dispatch:
  push:
    branches: [main]
    paths: [generate_profile.py, portrait.txt]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: regenerate svgs (live stats)
        run: python generate_profile.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark.svg light.svg
          git diff --cached --quiet || git commit -m "chore: refresh profile card"
          git push
